<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VibeTask Pro | Executive Management Console</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .today-line {
            width: 3px;
            background: #ef4444;
            height: 100%;
            position: absolute;
            z-index: 40;
            pointer-events: none;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.4);
        }

        .transition-all { transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .tab-counter { font-size: 0.7rem; padding: 2px 8px; border-radius: 8px; margin-left: 8px; font-weight: 900; }
        
        input[type="date"]::-webkit-calendar-picker-indicator { cursor: pointer; opacity: 0.6; }
        input[type="date"]::-webkit-calendar-picker-indicator:hover { opacity: 1; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-[#f1f5f9] text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const DEPARTMENTS = [
            "Account", "BC", "WH/LG", "BIT", "Editor-Jamsai", "GBT", "JCC", "People", 
            "Finance", "B2B Sales & Marketing", "Brand Marketing", "IT", "Online Sales", 
            "B2C Sales", "Inno", "Creative Design", "Strategic Planning", "Mar Com", 
            "Digital Marketing", "Editor-M&T", "BD", "Product Design", "Content Acquisition"
        ];

        const STORAGE_KEY = 'vibetask_master_v31_pro';

        const INITIAL_SEED = [
            { id: "s1", title: "ACD", status: "On Hold", priority: "Low", dept: "BC", startDate: "2025-12-08", dueDate: "2025-12-10", notes: "", parentId: null },
            { id: "s2", title: "BIT", status: "On Hold", priority: "Low", dept: "BIT", startDate: "2025-12-08", dueDate: "2025-12-10", notes: "", parentId: null },
            { id: "s3", title: "BCD", status: "Done", priority: "Medium", dept: "B2C Sales", startDate: "2025-12-08", dueDate: "2025-12-08", notes: "", parentId: null },
            { id: "s4", title: "ED Non Fiction", status: "Done", priority: "Medium", dept: "Editor-Jamsai", startDate: "2025-12-08", dueDate: "2025-12-08", notes: "", parentId: null },
            { id: "s5", title: "CliftonStrengths All 34", status: "Done", priority: "High", dept: "Strategic Planning", startDate: "2025-12-04", dueDate: "2025-12-09", notes: "", parentId: null },
            { id: "s6", title: "วิเคราะห์", status: "In Progress", priority: "High", dept: "Strategic Planning", startDate: "2025-12-04", dueDate: "2025-12-16", notes: "พี่อยากทำ dashboard เพื่อวัดผล", parentId: null },
            { id: "s7", title: "สรุป ED fiction จากการประชุม", status: "Done", priority: "Medium", dept: "Editor-Jamsai", startDate: "2025-12-08", dueDate: "2025-12-08", notes: "", parentId: "sub-task" }
        ];

        const Icon = ({ name, size = 18, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide && ref.current) {
                    ref.current.innerHTML = `<i data-lucide="${name}" class="${className}" style="width: ${size}px; height: ${size}px;"></i>`;
                    window.lucide.createIcons();
                }
            }, [name, size, className]);
            return <span ref={ref} className="inline-flex items-center justify-center pointer-events-none" />;
        };

        const App = () => {
            const [tasks, setTasks] = useState(() => {
                try {
                    const saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) return JSON.parse(saved);
                    const legacy = localStorage.getItem('vibetask_manager_v15_final');
                    if (legacy) return JSON.parse(legacy);
                    return INITIAL_SEED;
                } catch (e) { return INITIAL_SEED; }
            });

            const [lastUpdated, setLastUpdated] = useState(() => localStorage.getItem('vibetask_ts_v31') || 'Ready');
            const [viewMode, setViewMode] = useState('Board'); 
            const [hierarchyMode, setHierarchyMode] = useState('All'); 
            const [statFilter, setStatFilter] = useState('All');
            const [filterDept, setFilterDept] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingTask, setEditingTask] = useState(null);
            const [showOnHoldOnly, setShowOnHoldOnly] = useState(false);
            const [toast, setToast] = useState(null);

            const timelineContainerRef = useRef(null);

            useEffect(() => {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
            }, [tasks]);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 3000);
            };

            const recordChange = () => {
                const now = new Date().toLocaleString('th-TH', { 
                    day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' 
                });
                setLastUpdated(now);
                localStorage.setItem('vibetask_ts_v31', now);
            };

            const cleanText = (text) => text ? text.replace(/\s*\(.*?\)\s*/g, '').trim() : "";
            
            const parseDate = (str) => {
                if (!str || str === '-') return null;
                const s = str.toString().trim();
                if (s.includes('/')) {
                    const parts = s.split('/');
                    if (parts.length === 3) {
                        const [d, m, y] = parts;
                        return new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
                    }
                }
                const d = new Date(s);
                return isNaN(d.getTime()) ? null : d;
            };

            const formatDateForInput = (str) => {
                const d = parseDate(str);
                if (!d) return "";
                return d.toISOString().split('T')[0];
            };

            // --- DATA HANDLERS ---
            const parseCSV = (text) => {
                const rows = []; let currentRow = []; let currentField = ''; let inQuotes = false;
                for (let i = 0; i < text.length; i++) {
                    const char = text[i];
                    if (char === '"') {
                        if (inQuotes && text[i + 1] === '"') { currentField += '"'; i++; }
                        else inQuotes = !inQuotes;
                    } else if (char === ',' && !inQuotes) { currentRow.push(currentField); currentField = ''; }
                    else if (char === '\n' && !inQuotes) { currentRow.push(currentField); rows.push(currentRow); currentRow = []; currentField = ''; }
                    else if (char !== '\r') currentField += char;
                }
                if (currentField || currentRow.length > 0) { currentRow.push(currentField); rows.push(currentRow); }

                return rows.slice(1).map((cols, idx) => {
                    const name = cols[0]?.trim();
                    if (!name) return null;
                    
                    const statusRaw = cols[11]?.trim() || '';
                    let status = 'To Do';
                    if (statusRaw.includes('Hold')) status = 'On Hold';
                    else if (statusRaw.includes('Complete') || statusRaw === 'Done') status = 'Done';
                    else if (statusRaw.includes('Progress')) status = 'In Progress';
                    
                    const priorityRaw = (cols[8] || '').toLowerCase();
                    const isSub = name.toLowerCase().includes('sub') || name.includes('ย่อย') || (cols[3] || '').toLowerCase().includes('sub');
                    
                    const convertDate = (str) => {
                        if (!str || str === '-') return '';
                        const parts = str.split('/');
                        if (parts.length === 3) return `${parts[2]}-${parts[1].padStart(2, '0')}-${parts[0].padStart(2, '0')}`;
                        return str;
                    };

                    return {
                        id: `task-${idx}-${Date.now()}`,
                        title: name,
                        dept: cols[4]?.trim() || DEPARTMENTS[0],
                        dueDate: convertDate(cols[5]?.trim()),
                        startDate: convertDate(cols[10]?.trim()),
                        notes: cols[6]?.trim() || '',
                        status, 
                        priority: priorityRaw.includes('high') ? 'High' : priorityRaw.includes('low') ? 'Low' : 'Medium',
                        parentId: isSub ? 'sub-task' : null
                    };
                }).filter(t => t !== null);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = parseCSV(ev.target.result);
                        if (data.length > 0) {
                            if(confirm(`ตรวจพบข้อมูล ${data.length} รายการ ต้องการนำเข้าและเขียนทับข้อมูลเดิมหรือไม่?`)) {
                                setTasks(data); recordChange(); showToast(`นำเข้าสำเร็จ ${data.length} รายการ`);
                            }
                        }
                    } catch (err) { alert("เกิดข้อผิดพลาดในการประมวลผลไฟล์ CSV"); }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const handleExportJSON = () => {
                const dataStr = JSON.stringify(tasks, null, 2);
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                const link = document.createElement('a');
                link.setAttribute('href', dataUri);
                link.setAttribute('download', `vibetask_backup_${new Date().toISOString().split('T')[0]}.json`);
                link.click();
            };

            const handleJSONImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const parsed = JSON.parse(ev.target.result);
                        if (Array.isArray(parsed)) {
                            setTasks(parsed); recordChange(); showToast(`กู้คืนสำเร็จ ${parsed.length} รายการ`);
                        }
                    } catch (err) { alert('Invalid JSON: ' + err.message); }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            // --- LOGIC & ANALYTICS ---
            const sourcePool = useMemo(() => showOnHoldOnly ? tasks.filter(t => t.status === 'On Hold') : tasks.filter(t => t.status !== 'On Hold'), [tasks, showOnHoldOnly]);
            const hierarchyPool = useMemo(() => sourcePool.filter(t => {
                if (hierarchyMode === 'Main') return !t.parentId;
                if (hierarchyMode === 'Sub') return !!t.parentId;
                return true;
            }), [sourcePool, hierarchyMode]);

            // Fix for tabCounters error
            const tabCounters = useMemo(() => {
                const pool = showOnHoldOnly ? tasks.filter(t => t.status === 'On Hold') : tasks.filter(t => t.status !== 'On Hold');
                return {
                    All: pool.length,
                    Main: pool.filter(t => !t.parentId).length,
                    Sub: pool.filter(t => !!t.parentId).length
                };
            }, [tasks, showOnHoldOnly]);

            const dynamicStats = useMemo(() => ({
                total: hierarchyPool.length,
                finished: hierarchyPool.filter(t => t.status === 'Done').length,
                working: hierarchyPool.filter(t => t.status !== 'Done').length
            }), [hierarchyPool]);

            const proportions = useMemo(() => {
                const total = sourcePool.length || 1;
                const m = sourcePool.filter(t => !t.parentId).length;
                const s = sourcePool.filter(t => !!t.parentId).length;
                return {
                    mainPct: Math.round((m/total)*100),
                    subPct: Math.round((s/total)*100),
                    mainCount: m, subCount: s
                };
            }, [sourcePool]);

            const deptsInUse = useMemo(() => ['All', ...new Set(sourcePool.map(t => t.dept || '-'))], [sourcePool]);

            const displayTasks = useMemo(() => hierarchyPool.filter(t => {
                const search = searchQuery.toLowerCase();
                const matchSearch = t.title.toLowerCase().includes(search) || (t.notes || "").toLowerCase().includes(search);
                const matchDept = filterDept === 'All' || t.dept === filterDept;
                let matchStat = true;
                if (!showOnHoldOnly) {
                    if (statFilter === 'Done') matchStat = t.status === 'Done';
                    if (statFilter === 'Working') matchStat = (t.status !== 'Done');
                }
                return matchSearch && matchDept && matchStat;
            }), [hierarchyPool, searchQuery, filterDept, statFilter, showOnHoldOnly]);

            const timelineQueue = useMemo(() => (showOnHoldOnly ? hierarchyPool : hierarchyPool.filter(t => t.status !== 'Done'))
                .sort((a,b) => (parseDate(a.startDate) || 0) - (parseDate(b.startDate) || 0)), [hierarchyPool, showOnHoldOnly]);

            const timelineDates = useMemo(() => {
                let min = new Date(); let max = new Date();
                max.setDate(max.getDate() + 30);
                if (timelineQueue.length > 0) {
                    timelineQueue.forEach(t => {
                        const start = parseDate(t.startDate); const end = parseDate(t.dueDate);
                        if (start && start < min) min = new Date(start); 
                        if (end && end > max) max = new Date(end);
                    });
                }
                min.setDate(min.getDate() - 5); max.setDate(max.getDate() + 21);
                const dates = []; let curr = new Date(min);
                while (curr <= max && dates.length < 1000) {
                    dates.push(new Date(curr)); 
                    curr.setDate(curr.getDate() + 1); 
                }
                return dates;
            }, [timelineQueue]);

            // Fix for missing timelineMonths error
            const timelineMonths = useMemo(() => {
                const months = [];
                timelineDates.forEach((date, index) => {
                    const label = date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                    if (months.length === 0 || months[months.length - 1].label !== label) {
                        months.push({ label, startIndex: index, count: 1 });
                    } else months[months.length - 1].count++;
                });
                return months;
            }, [timelineDates]);

            const todayIndex = useMemo(() => timelineDates.findIndex(d => d.toDateString() === new Date().toDateString()), [timelineDates]);

            const handleAction = (type, data) => {
                if (type === 'edit') { setEditingTask(data); setFormData({...data}); setIsModalOpen(true); }
                if (type === 'delete') { if(confirm('ต้องการลบรายการนี้ใช่หรือไม่?')) { setTasks(tasks.filter(t => t.id !== data.id)); recordChange(); showToast('ลบรายการสำเร็จ'); } }
                if (type === 'status') { setTasks(tasks.map(t => t.id === data.id ? {...t, status: data.newStatus} : t)); recordChange(); }
                if (type === 'hierarchy') { setTasks(tasks.map(t => t.id === data.id ? {...t, parentId: data.parentId} : t)); recordChange(); }
            };

            const [formData, setFormData] = useState({ 
                title: '', dept: DEPARTMENTS[10], priority: 'Medium', status: 'To Do', category: '', notes: '',
                startDate: '', dueDate: '', parentId: null, isManualHierarchy: false
            });

            const handleTitleChange = (val) => {
                const subKeywords = ['sub', 'ย่อย', 'แตก', '-', '>', 'detail', 'part'];
                const isLikelySub = subKeywords.some(k => val.toLowerCase().includes(k));
                setFormData(prev => ({
                    ...prev,
                    title: val,
                    parentId: (!prev.isManualHierarchy) ? (isLikelySub ? 'sub-task' : null) : prev.parentId
                }));
            };

            const saveForm = (e) => {
                e.preventDefault();
                if (editingTask) setTasks(tasks.map(t => t.id === editingTask.id ? {...formData, id: t.id} : t));
                else setTasks([...tasks, {...formData, id: Date.now().toString()}]);
                recordChange(); setIsModalOpen(false); showToast(editingTask ? 'อัปเดตงานสำเร็จ' : 'สร้างงานสำเร็จ');
            };

            useEffect(() => {
                if (viewMode === 'Timeline' && todayIndex !== -1 && timelineContainerRef.current) {
                    const scrollContainer = timelineContainerRef.current;
                    const todayPos = 320 + (todayIndex * 40); 
                    scrollContainer.scrollLeft = todayPos - (scrollContainer.clientWidth / 2);
                }
            }, [viewMode, todayIndex]);

            const TaskCard = ({ task }) => (
                <div onClick={() => handleAction('edit', task)} className="bg-white rounded-3xl border border-slate-200 p-6 shadow-sm hover:shadow-xl transition-all cursor-pointer relative overflow-hidden group mb-4">
                    <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${task.priority === 'High' ? 'bg-rose-500 shadow-md' : 'bg-indigo-500'}`} />
                    <div className="flex justify-between items-start mb-3">
                        <span className={`text-[8px] font-black uppercase px-2 py-1 rounded-lg ${task.priority === 'High' ? 'bg-rose-50 text-rose-600' : 'bg-slate-50 text-slate-400'}`}>{task.priority}</span>
                        <div className="flex gap-2">
                            <span className="text-[9px] font-black text-indigo-500 uppercase tracking-widest">{task.parentId ? 'SUB' : 'MAIN'}</span>
                            <button onClick={(e) => {e.stopPropagation(); handleAction('delete', task)}} className="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-rose-500 transition-all bg-transparent border-none p-1"><Icon name="trash-2" size={14}/></button>
                        </div>
                    </div>
                    <h4 className="text-[15px] font-bold text-slate-800 leading-snug mb-3 group-hover:text-indigo-600 transition-colors">{cleanText(task.title)}</h4>
                    <div className="flex justify-between items-center text-[10px] font-bold border-b border-slate-50 pb-3 mb-4 text-slate-400 uppercase tracking-wider">
                        <span className="flex items-center gap-1.5 truncate max-w-[150px]"><Icon name="users" size={12} className="text-indigo-400 shrink-0"/> {task.dept}</span>
                        <span className="font-mono bg-slate-50 px-2 py-0.5 rounded">{task.dueDate || '-'}</span>
                    </div>
                    <div className="flex gap-1.5">
                        {['Done', 'In Progress', 'On Hold'].map(st => (
                            <button key={st} onClick={(e) => { e.stopPropagation(); handleAction('status', {id: task.id, newStatus: st}) }} className={`flex-1 py-1.5 rounded-xl text-[8px] font-black uppercase transition-all ${task.status === st ? (st==='Done'?'bg-emerald-600 text-white shadow-md':st==='On Hold'?'bg-rose-500 text-white shadow-md':'bg-indigo-600 text-white shadow-md') : 'bg-slate-50 text-slate-300 hover:bg-slate-100'}`}>{st === 'In Progress' ? 'Working' : st}</button>
                        ))}
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen pb-20 text-slate-900 font-sans bg-[#f8fafc]">
                    {toast && (
                        <div className="fixed top-5 left-1/2 -translate-x-1/2 z-[300] bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 animate-fadeIn">
                            <Icon name="check-circle" className="text-emerald-400" />
                            <span className="text-sm font-bold uppercase tracking-tight">{toast}</span>
                        </div>
                    )}

                    <nav className="glass-header border-b border-slate-200 sticky top-0 z-[100] px-8 py-4 shadow-sm flex flex-wrap justify-between items-center gap-4">
                        <div className="flex items-center gap-3">
                            <div className="bg-slate-900 p-2.5 rounded-xl text-white shadow-lg rotate-3"><Icon name="zap" size={20}/></div>
                            <div>
                                <h1 className="text-lg font-black tracking-tight uppercase leading-none">VibeTask <span className="text-indigo-600 font-black">Pro</span></h1>
                                <p className="text-[9px] font-bold text-slate-400 uppercase mt-1 tracking-widest leading-none">Sync: <span className="text-indigo-500 font-black">{lastUpdated}</span></p>
                            </div>
                        </div>

                        <div className="flex bg-slate-100 p-1.5 rounded-2xl shadow-inner">
                            {['Board', 'Timeline', 'Tasks'].map(v => (<button key={v} onClick={() => setViewMode(v)} className={`px-6 py-2 rounded-xl text-[10px] font-black transition-all ${viewMode === v ? 'bg-white text-slate-900 shadow-md transform scale-105' : 'text-slate-400 hover:text-slate-600'}`}>{v.toUpperCase()}</button>))}
                        </div>

                        <div className="flex items-center gap-4">
                            <div className="flex bg-slate-50 p-1 rounded-2xl border border-slate-200">
                                <label className="text-slate-500 hover:bg-white hover:text-indigo-600 cursor-pointer px-4 py-2.5 rounded-xl transition-all flex items-center gap-2 text-[10px] font-black uppercase">
                                    <Icon name="file-text" size={14}/> <span>Import</span><input type="file" accept=".csv" className="hidden" onChange={handleFileUpload}/>
                                </label>
                                <div className="w-[1px] h-4 bg-slate-200 self-center mx-1"></div>
                                <label className="text-slate-500 hover:bg-white hover:text-indigo-600 cursor-pointer px-4 py-2.5 rounded-xl transition-all flex items-center gap-2 text-[10px] font-black uppercase">
                                    <Icon name="file-up" size={14}/> <span>Restore</span><input type="file" accept=".json" className="hidden" onChange={handleJSONImport}/>
                                </label>
                                <div className="w-[1px] h-4 bg-slate-200 self-center mx-1"></div>
                                <button onClick={handleExportJSON} className="text-slate-500 hover:bg-white hover:text-indigo-600 px-4 py-2.5 rounded-xl transition-all flex items-center gap-2 text-[10px] font-black uppercase"><Icon name="download-cloud" size={14}/> <span>Export</span></button>
                            </div>
                            <button onClick={() => {setEditingTask(null); setIsModalOpen(true)}} className="bg-indigo-600 text-white px-8 py-3.5 rounded-2xl font-black uppercase text-[12px] flex items-center gap-3 shadow-xl shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-1 transition-all border-b-4 border-indigo-900 active:translate-y-0.5 active:border-b-0"><Icon name="plus" size={20} className="stroke-[3.5px]"/> <span>Add New Task</span></button>
                        </div>
                    </nav>

                    <main className="max-w-[1400px] mx-auto px-8 pt-10">
                        {/* Hierarchy Tab Row */}
                        <div className="flex flex-col md:flex-row justify-between items-center mb-10 gap-6">
                            <div className="bg-white p-1.5 rounded-3xl border border-slate-200 shadow-sm flex gap-1">
                                {[
                                    { l: 'All', k: 'All', c: tabCounters.All },
                                    { l: 'Main', k: 'Main', c: tabCounters.Main },
                                    { l: 'Sub', k: 'Sub', c: tabCounters.Sub }
                                ].map(m => (
                                    <button key={m.k} onClick={() => { setHierarchyMode(m.k); setStatFilter('All'); setShowOnHoldOnly(false); }} className={`px-14 py-3.5 rounded-2xl text-[12px] font-black uppercase tracking-widest flex items-center transition-all ${!showOnHoldOnly && hierarchyMode === m.k ? 'bg-slate-900 text-white shadow-2xl scale-105' : 'text-slate-400 hover:text-slate-600'}`}>
                                        {m.l} <span className={`tab-counter ${!showOnHoldOnly && hierarchyMode === m.k ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'}`}>{m.c}</span>
                                    </button>
                                ))}
                            </div>
                            <button onClick={() => { setShowOnHoldOnly(!showOnHoldOnly); setStatFilter('All'); }} className={`px-10 py-3.5 rounded-3xl text-[12px] font-black uppercase tracking-widest flex items-center gap-3 transition-all border-2 ${showOnHoldOnly ? 'bg-rose-500 text-white border-transparent shadow-xl scale-105' : 'bg-white text-slate-400 border-slate-200 hover:border-rose-400 hover:text-rose-500'}`}>
                                <Icon name="pause-circle" size={18}/> <span>On Hold View</span><span className={`tab-counter ${showOnHoldOnly ? 'bg-white text-rose-500' : 'bg-rose-50 text-rose-500'}`}>{tasks.filter(t => t.status === 'On Hold').length}</span>
                            </button>
                        </div>

                        {/* Metrics */}
                        <section className="grid grid-cols-1 sm:grid-cols-3 gap-8 mb-10">
                            {[ { l: showOnHoldOnly ? 'ON HOLD TOTAL' : 'TOTAL SCOPE', v: dynamicStats.total, k: 'All', c: showOnHoldOnly ? 'bg-rose-600' : 'bg-indigo-600', i: 'briefcase' }, { l: 'FINISHED', v: dynamicStats.finished, k: 'Done', c: 'bg-emerald-600', i: 'check-circle' }, { l: 'WORKING', v: dynamicStats.working, k: 'Working', c: 'bg-amber-500', i: 'zap' } ].map(s => (
                                <div key={s.k} onClick={() => setStatFilter(statFilter === s.k ? 'All' : s.k)} className={`p-10 rounded-[3rem] border flex flex-col justify-between h-48 cursor-pointer transition-all active:scale-95 ${statFilter === s.k ? `${s.c} text-white shadow-2xl scale-105` : `bg-white border-slate-200 shadow-sm hover:border-indigo-400`}`}>
                                    <div className={`p-4 rounded-2xl w-fit ${statFilter === s.k ? 'bg-white/20' : 'bg-slate-50 text-slate-400'}`}><Icon name={s.i} size={28} /></div>
                                    <div><p className={`text-[11px] font-black uppercase tracking-[0.2em] ${statFilter === s.k ? 'text-white/80' : 'text-slate-400'}`}>{s.l}</p><p className="text-5xl font-black mt-1 leading-none">{s.v}</p></div>
                                </div>
                            ))}
                        </section>

                        {/* Proportion Bar */}
                        <section className="bg-white rounded-[2.5rem] p-10 mb-16 border border-slate-100 shadow-sm relative overflow-hidden animate-fadeIn">
                            <div className="flex justify-between items-center mb-8 px-2">
                                <div><h3 className="text-[13px] font-black text-slate-800 uppercase tracking-[0.3em] flex items-center gap-3"><Icon name="pie-chart" size={18} className="text-indigo-600"/> Infrastructure Balance</h3><p className="text-[10px] text-slate-400 uppercase font-bold mt-1 tracking-widest leading-none opacity-70">Ratio between Strategy and Detailed Execution</p></div>
                                <div className="flex gap-10">
                                    <div className="flex flex-col items-end"><span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Main Task</span><span className="text-xl font-black text-indigo-600 leading-none">{proportions.mainPct}%</span></div>
                                    <div className="flex flex-col items-end"><span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Sub Task</span><span className="text-xl font-black text-slate-400 leading-none">{proportions.subPct}%</span></div>
                                </div>
                            </div>
                            <div className="relative h-4 bg-slate-100 rounded-full overflow-hidden flex shadow-inner">
                                <div className="h-full bg-indigo-600 transition-all duration-1000 z-10 progress-bar-glow" style={{ width: `${proportions.mainPct}%` }} />
                                <div className="h-full bg-slate-300 transition-all duration-1000" style={{ width: `${proportions.subPct}%` }} />
                            </div>
                        </section>

                        {/* Rendering View Content */}
                        {viewMode === 'Board' && (
                            <>
                                <div className="flex flex-col md:flex-row justify-between items-center gap-6 mb-12 bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm">
                                    <div className="flex items-center gap-3 overflow-x-auto no-scrollbar w-full md:w-auto">
                                        <Icon name="filter" size={18} className="text-slate-300 mr-3 shrink-0" />
                                        {deptsInUse.map(d => <button key={d} onClick={() => setFilterDept(d)} className={`px-6 py-3 rounded-2xl text-[11px] font-black uppercase transition-all border-2 whitespace-nowrap ${filterDept === d ? 'bg-slate-900 text-white border-transparent shadow-lg' : 'bg-white text-slate-400 border-slate-50 hover:bg-slate-50'}`}>{d}</button>)}
                                    </div>
                                    <div className="relative w-full md:w-[400px]"><Icon name="search" size={20} className="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400" /><input type="text" placeholder="Search project name..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full pl-14 pr-6 py-4 bg-slate-50 border-none rounded-3xl text-sm font-bold focus:ring-4 focus:ring-indigo-500/10 outline-none shadow-inner"/></div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                    {[ { t: showOnHoldOnly ? 'ON HOLD QUEUE' : 'WORKING', s: 'Working' }, { t: showOnHoldOnly ? 'PAUSED PROJECTS' : 'FINISHED', s: 'Done' } ].map(col => (
                                        <div key={col.s} className="flex flex-col">
                                            <div className={`flex items-center justify-between mb-8 px-10 py-5 rounded-[2rem] shadow-xl text-white ${showOnHoldOnly ? 'bg-rose-600' : 'bg-slate-900'}`}><h2 className="font-black uppercase tracking-[0.3em] text-[13px]">{col.t}</h2><span className="text-[11px] font-black bg-white/20 px-5 py-2 rounded-full">{displayTasks.filter(t => col.s === 'Working' ? (t.status !== 'Done') : t.status === 'Done').length}</span></div>
                                            <div className="space-y-2 min-h-[500px]">
                                                {displayTasks.filter(t => col.s === 'Working' ? (t.status !== 'Done') : t.status === 'Done').map(t => <TaskCard key={t.id} task={t}/>)}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </>
                        )}

                        {viewMode === 'Timeline' && (
                            <div className="bg-white rounded-[3rem] border border-slate-200 shadow-2xl overflow-hidden flex flex-col max-h-[800px] text-left animate-fadeIn">
                                <div className="overflow-auto relative no-scrollbar" ref={timelineContainerRef}>
                                    {todayIndex !== -1 && <div className="today-line" style={{ left: `calc(320px + ${todayIndex * 40}px + 19px)` }}><div className="bg-red-500 text-white text-[8px] font-black px-2 py-1 rounded absolute -top-1 left-0 transform -translate-x-1/2 shadow-sm animate-pulse-soft">TODAY</div></div>}
                                    <table className="w-full border-separate border-spacing-0">
                                        <thead className="sticky top-0 z-[50]">
                                            <tr className="glass-header"><th className="sticky left-0 bg-white border-b border-r border-slate-200 p-6 text-[11px] font-black uppercase text-slate-400 min-w-[320px]">Period</th>{timelineMonths.map((m, i) => <th key={i} colSpan={m.count} className="p-3 border-b border-r bg-indigo-50/80 backdrop-blur-md text-[11px] font-black text-indigo-600 uppercase text-center border-t border-indigo-100">{m.label}</th>)}</tr>
                                            <tr className="glass-header"><th className="sticky left-0 bg-white border-b border-r border-slate-200 p-6 text-[11px] font-black uppercase text-slate-500 min-w-[320px]">Deliverable Name</th>{timelineDates.map((d, i) => <th key={i} className={`p-2 border-b border-r min-w-[40px] text-center bg-white ${d.toDateString() === new Date().toDateString() ? 'bg-indigo-100/50' : ''}`}><div className="text-[9px] font-bold text-slate-400 uppercase">{d.toLocaleDateString('en-US',{weekday:'short'})}</div><div className={`text-[12px] font-black ${d.toDateString() === new Date().toDateString() ? 'text-red-500' : 'text-slate-800'}`}>{d.getDate()}</div></th>)}</tr>
                                        </thead>
                                        <tbody>
                                            {timelineQueue.map(task => {
                                                const s = parseDate(task.startDate); const du = parseDate(task.dueDate);
                                                return (<tr key={task.id} className="hover:bg-slate-50/50 group"><td onClick={() => handleAction('edit', task)} className="sticky left-0 bg-white z-20 p-6 border-b border-r text-sm font-bold text-slate-700 cursor-pointer group-hover:bg-slate-50 shadow-[4px_0_10px_rgba(0,0,0,0.03)]"><div className="flex items-center gap-3"><div className={`w-2.5 h-2.5 rounded-full shrink-0 ${task.priority === 'High' ? 'bg-rose-500' : 'bg-indigo-500'}`} /><span className="truncate max-w-[200px]">{cleanText(task.title)}</span></div><div className="text-[10px] font-black text-indigo-400 mt-2 uppercase tracking-widest leading-none">{task.dept}</div></td>{timelineDates.map((d, i) => <td key={i} className="border-b border-r p-0 relative h-16">{s && du && d >= s && d <= du && <div className={`absolute inset-y-5 left-0 right-0 z-0 transition-all ${task.status === 'In Progress' ? 'bg-indigo-600 shadow-xl' : task.status === 'On Hold' ? 'bg-rose-400' : 'bg-slate-200'} ${d.toDateString() === s.toDateString() ? 'rounded-l-full' : ''} ${d.toDateString() === du.toDateString() ? 'rounded-r-full' : ''}`} />}</td>)}</tr>);
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {viewMode === 'Tasks' && (
                            <div className="bg-white rounded-[3.5rem] border border-slate-200 shadow-sm mb-20 overflow-hidden animate-fadeIn">
                                <div className="p-10 border-b border-slate-100 bg-slate-50"><h2 className="text-2xl font-black text-slate-800 uppercase tracking-tight">Rapid Scope Manager</h2><p className="text-[11px] font-bold text-slate-400 uppercase mt-1 italic tracking-[0.2em]">Bulk Override for Level & Status</p></div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left">
                                        <thead><tr className="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] border-b"><th className="p-8">Deliverable Task</th><th className="p-8 text-center">Hierarchy</th><th className="p-8 text-center">Status Control</th><th className="p-8 text-right">Actions</th></tr></thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {displayTasks.map(task => (
                                                <tr key={task.id} className="hover:bg-slate-50/50 transition-colors group">
                                                    <td className="p-8"><p className="text-md font-bold text-slate-800 mb-1 leading-tight">{cleanText(task.title)}</p><div className="flex gap-6 text-[10px] font-black uppercase text-slate-400 tracking-widest"><span>Dept: <b className="text-indigo-500">{task.dept}</b></span><span>Due: <b className="text-slate-600 font-mono">{task.dueDate || '-'}</b></span></div></td>
                                                    <td className="p-8 text-center"><div className="flex bg-slate-100 p-1 rounded-xl w-fit mx-auto shadow-inner"><button onClick={() => handleAction('hierarchy', {id: task.id, parentId: null})} className={`px-8 py-2.5 rounded-xl text-[11px] font-black uppercase transition-all ${!task.parentId ? 'bg-white text-indigo-600 shadow-md transform scale-105' : 'text-slate-400 opacity-60'}`}>Main</button><button onClick={() => handleAction('hierarchy', {id: task.id, parentId: 'sub-task'})} className={`px-8 py-2.5 rounded-xl text-[11px] font-black uppercase transition-all ${task.parentId ? 'bg-indigo-600 text-white shadow-md transform scale-105' : 'text-slate-400 opacity-60'}`}>Sub</button></div></td>
                                                    <td className="p-8 text-center"><div className="flex gap-2 justify-center">{['Done', 'In Progress', 'On Hold'].map(st => (<button key={st} onClick={() => handleAction('status', {id: task.id, newStatus: st})} className={`px-4 py-2.5 rounded-xl text-[9px] font-black uppercase transition-all ${task.status === st ? (st==='Done'?'bg-emerald-600 text-white':st==='On Hold'?'bg-rose-500 text-white':'bg-amber-500 text-white') : 'bg-white text-slate-300 border border-slate-100 hover:border-slate-300'}`}>{st === 'In Progress' ? 'Working' : st}</button>))}</div></td>
                                                    <td className="p-8 text-right flex justify-end gap-3 items-center"><button onClick={() => handleAction('edit', task)} className="p-3 bg-indigo-50 text-indigo-600 rounded-2xl hover:bg-indigo-100 shadow-sm transition-all"><Icon name="edit-2" size={18}/></button><button onClick={() => handleAction('delete', task)} className="p-3 bg-rose-50 text-rose-300 hover:text-rose-600 rounded-2xl shadow-sm transition-all"><Icon name="trash-2" size={18}/></button></td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Task Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-xl z-[200] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[4rem] shadow-2xl w-full max-w-xl overflow-hidden animate-in zoom-in duration-300">
                                <div className="px-12 py-10 bg-slate-900 text-white flex justify-between items-center relative overflow-hidden">
                                    <div className="relative z-10"><h2 className="text-3xl font-black tracking-tighter uppercase text-white">{editingTask ? 'Edit Task' : 'New Entry'}</h2><p className="text-slate-400 text-[10px] font-black uppercase tracking-[0.4em] mt-1 italic leading-none">Enterprise Console V31</p></div>
                                    <button onClick={() => setIsModalOpen(false)} className="p-4 bg-white/10 hover:bg-white/20 rounded-3xl transition-all"><Icon name="x" size={28} className="text-white"/></button>
                                </div>
                                <form onSubmit={saveForm} className="p-12 space-y-8 text-slate-900">
                                    <div className="space-y-2"><label className="text-[11px] font-black uppercase text-slate-400 tracking-widest ml-4">Task Name</label><input type="text" required autoFocus className="w-full px-8 py-5 rounded-[2.5rem] bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-500 outline-none font-bold text-lg shadow-inner" value={formData.title} onChange={e => handleTitleChange(e.target.value)}/></div>
                                    <div className="grid grid-cols-2 gap-6 text-slate-900">
                                        <div className="space-y-2"><label className="text-[11px] font-black uppercase text-slate-400 tracking-widest ml-4">Start Date</label><input type="date" className="w-full px-7 py-5 rounded-3xl bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-500 outline-none font-bold text-sm shadow-inner" value={formData.startDate} onChange={e => setFormData({...formData, startDate: e.target.value})}/></div>
                                        <div className="space-y-2"><label className="text-[11px] font-black uppercase text-slate-400 tracking-widest ml-4">Due Date</label><input type="date" className="w-full px-7 py-5 rounded-3xl bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-500 outline-none font-bold text-sm shadow-inner" value={formData.dueDate} onChange={e => setFormData({...formData, dueDate: e.target.value})}/></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-6 text-slate-900">
                                        <div className="space-y-2"><label className="text-[11px] font-black uppercase text-slate-400 tracking-widest ml-4">Department</label><select className="w-full px-8 py-5 rounded-3xl bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-500 outline-none font-black text-sm cursor-pointer shadow-inner appearance-none transition-all" value={formData.dept} onChange={e => setFormData({...formData, dept: e.target.value})}>{DEPARTMENTS.map(d => <option key={d} value={d}>{d}</option>)}</select></div>
                                        <div className="space-y-2"><label className="text-[11px] font-black uppercase text-slate-400 tracking-widest ml-4">Hierarchy</label><div className="flex bg-slate-100 p-1.5 rounded-[2rem]"><button type="button" onClick={() => setFormData({...formData, parentId: null})} className={`flex-1 py-4 rounded-3xl text-[11px] font-black uppercase transition-all ${!formData.parentId ? 'bg-white text-indigo-600 shadow-lg' : 'text-slate-400'}`}>Main</button><button type="button" onClick={() => setFormData({...formData, parentId: 'sub-task'})} className={`flex-1 py-4 rounded-3xl text-[11px] font-black uppercase transition-all ${formData.parentId ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400'}`}>Sub</button></div></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-6 text-slate-900">
                                        <div className="space-y-2"><label className="text-[11px] font-black uppercase text-slate-400 tracking-widest ml-4">Status</label><select className="w-full px-7 py-5 rounded-3xl bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-500 outline-none font-black text-sm cursor-pointer shadow-inner appearance-none transition-all" value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})}><option value="To Do">To Do</option><option value="In Progress">In Progress</option><option value="Done">Done</option><option value="On Hold">On Hold</option></select></div>
                                        <div className="space-y-2"><label className="text-[11px] font-black uppercase text-slate-400 tracking-widest ml-4">Priority</label><select className="w-full px-7 py-5 rounded-3xl bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-500 outline-none font-black text-sm cursor-pointer shadow-inner appearance-none transition-all" value={formData.priority} onChange={e => setFormData({...formData, priority: e.target.value})}><option value="Low">Low</option><option value="Medium">Medium</option><option value="High">High Priority</option></select></div>
                                    </div>
                                    <div className="pt-8 flex gap-5"><button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 bg-slate-100 text-slate-500 py-6 rounded-3xl font-black uppercase text-[12px] hover:bg-slate-200 transition-all">Discard</button><button type="submit" className="flex-[2] bg-indigo-600 text-white py-6 rounded-[2.5rem] font-black uppercase text-[12px] shadow-2xl shadow-indigo-100 hover:bg-indigo-700 transition-all">Save Changes</button></div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
