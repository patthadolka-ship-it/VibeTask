<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Manager Dashboard - Ultra Timeline</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; letter-spacing: -0.01em; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .timeline-grid {
            background-size: 40px 100%;
            background-image: linear-gradient(to right, #f1f5f9 1px, transparent 1px);
        }

        .task-bar-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .glass-header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .today-line {
            width: 3px;
            background: #ef4444;
            height: 100%;
            position: absolute;
            z-index: 40;
            pointer-events: none;
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.4);
        }

        .weekend-col {
            background: rgba(248, 250, 252, 0.5);
        }

        @keyframes pulse-soft {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .animate-pulse-soft { animation: pulse-soft 3s infinite; }
    </style>
</head>
<body class="bg-[#f1f5f9] text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const INITIAL_DEPARTMENTS = [
            "Account", "ACD", "BIT", "BCD", "ED", "Planning", "HR", "Strategic Planning", 
            "Finance", "B2B Sales & Marketing", "Brand Marketing", "IT", "Online Sales", 
            "B2C Sales", "Inno", "Creative Design", "Mar Com"
        ];

        const Icon = ({ name, size = 18, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    const iconName = name.split('-').map((s,i) => i===0 ? s : s.charAt(0).toUpperCase() + s.slice(1)).join('');
                    const svg = window.lucide.icons[name] || window.lucide.icons[iconName];
                    if (svg) {
                        ref.current.innerHTML = svg.toSvg({ width: size, height: size, 'stroke-width': 2.5, class: className });
                    }
                }
            }, [name, size, className]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} />;
        };

        const App = () => {
            const [tasks, setTasks] = useState(() => {
                try {
                    const saved = localStorage.getItem('vibetask_manager_v15_final');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) { return []; }
            });

            const [lastUpdated, setLastUpdated] = useState(() => localStorage.getItem('vibetask_ts_v15') || 'Ready');
            const [viewMode, setViewMode] = useState('Timeline'); 
            const [hierarchyMode, setHierarchyMode] = useState('All'); 
            const [statFilter, setStatFilter] = useState('All');
            const [filterDept, setFilterDept] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingTask, setEditingTask] = useState(null);
            const [showOnHoldOnly, setShowOnHoldOnly] = useState(false);
            const [toast, setToast] = useState(null);

            const timelineContainerRef = useRef(null);

            useEffect(() => {
                localStorage.setItem('vibetask_manager_v15_final', JSON.stringify(tasks));
            }, [tasks]);

            // Auto-scroll to today
            useEffect(() => {
                if (viewMode === 'Timeline' && todayIndex !== -1 && timelineContainerRef.current) {
                    const scrollContainer = timelineContainerRef.current;
                    const todayPos = 320 + (todayIndex * 40); // 320 is sticky col width, 40 is day width
                    scrollContainer.scrollLeft = todayPos - (scrollContainer.clientWidth / 2);
                }
            }, [viewMode]);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 3000);
            };

            const recordChange = () => {
                const now = new Date().toLocaleString('th-TH', { 
                    day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' 
                });
                setLastUpdated(now);
                localStorage.setItem('vibetask_ts_v15', now);
            };

            const cleanText = (text) => text ? text.toString().replace(/\s*\(.*?\)\s*/g, '').trim() : "";
            
            const parseDate = (str) => {
                if (!str || str === '-') return null;
                const s = str.toString().trim();
                if (s.includes('/')) {
                    const parts = s.split('/');
                    if (parts.length === 3) {
                        const [d, m, y] = parts;
                        const date = new Date(parseInt(y), parseInt(m) - 1, parseInt(d));
                        return isNaN(date.getTime()) ? null : date;
                    }
                }
                const d = new Date(s);
                return isNaN(d.getTime()) ? null : d;
            };

            const formatDateForInput = (str) => {
                const d = parseDate(str);
                if (!d) return "";
                return d.toISOString().split('T')[0];
            };

            const handleExportJSON = () => {
                const dataStr = JSON.stringify(tasks, null, 2);
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                const exportFileDefaultName = `tasks_backup_${new Date().toISOString().split('T')[0]}.json`;
                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', exportFileDefaultName);
                linkElement.click();
            };

            const handleJSONImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const parsed = JSON.parse(ev.target.result);
                        if (Array.isArray(parsed)) {
                            setTasks(parsed);
                            setStatFilter('All');
                            const onHoldCount = parsed.filter(t => t.status === 'On Hold').length;
                            if (onHoldCount > parsed.length / 2) setShowOnHoldOnly(true);
                            recordChange();
                            showToast(`Imported ${parsed.length} tasks successfully`);
                        }
                    } catch (err) { alert('Invalid JSON: ' + err.message); }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const departments = useMemo(() => {
                const set = new Set(INITIAL_DEPARTMENTS);
                tasks.forEach(t => { if(t.dept) set.add(t.dept); });
                return Array.from(set).sort();
            }, [tasks]);

            const sourcePool = useMemo(() => {
                return showOnHoldOnly 
                    ? tasks.filter(t => t.status === 'On Hold') 
                    : tasks.filter(t => t.status !== 'On Hold');
            }, [tasks, showOnHoldOnly]);
            
            const hierarchyPool = useMemo(() => sourcePool.filter(t => {
                if (hierarchyMode === 'Main') return !t.parentId;
                if (hierarchyMode === 'Sub') return !!t.parentId;
                return true;
            }), [sourcePool, hierarchyMode]);

            const tabCounters = useMemo(() => {
                const pool = showOnHoldOnly ? tasks.filter(t => t.status === 'On Hold') : tasks.filter(t => t.status !== 'On Hold');
                return {
                    All: pool.length,
                    Main: pool.filter(t => !t.parentId).length,
                    Sub: pool.filter(t => !!t.parentId).length
                }
            }, [tasks, showOnHoldOnly]);

            const timelineQueue = useMemo(() => {
                const base = showOnHoldOnly ? hierarchyPool : hierarchyPool.filter(t => t.status !== 'Done');
                return [...base].sort((a,b) => (parseDate(a.startDate) || 0) - (parseDate(b.startDate) || 0));
            }, [hierarchyPool, showOnHoldOnly]);

            const timelineDates = useMemo(() => {
                let min = new Date(); let max = new Date();
                max.setDate(max.getDate() + 30);
                if (timelineQueue.length > 0) {
                    timelineQueue.forEach(t => {
                        const start = parseDate(t.startDate); const end = parseDate(t.dueDate);
                        if (start && start < min) min = new Date(start); 
                        if (end && end > max) max = new Date(end);
                    });
                }
                min.setDate(min.getDate() - 10); max.setDate(max.getDate() + 20);
                const dates = []; let curr = new Date(min);
                while (curr <= max && dates.length < 1000) {
                    dates.push(new Date(curr)); 
                    curr.setDate(curr.getDate() + 1); 
                }
                return dates;
            }, [timelineQueue]);

            const timelineMonths = useMemo(() => {
                const months = [];
                timelineDates.forEach((date, index) => {
                    const monthLabel = date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                    if (months.length === 0 || months[months.length - 1].label !== monthLabel) {
                        months.push({ label: monthLabel, startIndex: index, count: 1 });
                    } else months[months.length - 1].count++;
                });
                return months;
            }, [timelineDates]);

            const todayIndex = useMemo(() => timelineDates.findIndex(d => d.toDateString() === new Date().toDateString()), [timelineDates]);

            const handleAction = (type, data) => {
                if (type === 'edit') { 
                    setEditingTask(data); 
                    setFormData({
                        ...data, 
                        startDate: formatDateForInput(data.startDate),
                        dueDate: formatDateForInput(data.dueDate),
                        isManualHierarchy: true
                    }); 
                    setIsModalOpen(true); 
                }
                if (type === 'delete') { if(window.confirm('Delete this task?')) { setTasks(tasks.filter(t => t.id !== data.id)); recordChange(); } }
                if (type === 'status') { setTasks(tasks.map(t => t.id === data.id ? {...t, status: data.newStatus} : t)); recordChange(); }
                if (type === 'hierarchy') { setTasks(tasks.map(t => t.id === data.id ? {...t, parentId: data.parentId} : t)); recordChange(); }
            };

            const [formData, setFormData] = useState({ 
                title: '', dept: INITIAL_DEPARTMENTS[0], priority: 'Medium', status: 'To Do', category: '', notes: '',
                startDate: '', dueDate: '', parentId: null, isManualHierarchy: false
            });

            const saveForm = (e) => {
                e.preventDefault();
                if (editingTask) setTasks(tasks.map(t => t.id === editingTask.id ? {...formData, id: t.id} : t));
                else setTasks([...tasks, {...formData, id: Date.now().toString()}]);
                recordChange();
                setIsModalOpen(false);
            };

            return (
                <div className="min-h-screen bg-[#f8fafc] text-slate-900 font-sans pb-10">
                    {toast && (
                        <div className="fixed top-5 left-1/2 -translate-x-1/2 z-[300] bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 animate-fadeIn">
                            <Icon name="check-circle" className="text-emerald-400" />
                            <span className="text-sm font-bold uppercase tracking-tight">{toast}</span>
                        </div>
                    )}
                    
                    <nav className="glass-header border-b border-slate-200 sticky top-0 z-[100] px-8 py-4 shadow-sm flex flex-wrap justify-between items-center gap-4">
                        <div className="flex items-center gap-4">
                            <div className="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-xl shadow-indigo-100"><Icon name="layout-dashboard" size={24}/></div>
                            <div>
                                <h1 className="text-lg font-black tracking-tight uppercase leading-none">Executive Console</h1>
                                <p className="text-[10px] font-bold text-slate-400 uppercase mt-1 tracking-widest">Update: <span className="text-indigo-600">{lastUpdated}</span></p>
                            </div>
                        </div>

                        <div className="flex bg-slate-100 p-1.5 rounded-2xl shadow-inner">
                            {['Board', 'Timeline', 'Tasks'].map(v => (
                                <button key={v} onClick={() => setViewMode(v)} className={`px-6 py-2.5 rounded-xl text-[11px] font-black transition-all ${viewMode === v ? 'bg-white text-indigo-600 shadow-md transform scale-105' : 'text-slate-400 hover:text-slate-600'}`}>
                                    {v.toUpperCase()}
                                </button>
                            ))}
                        </div>

                        <div className="flex items-center gap-3">
                            <label className="bg-white border border-slate-200 text-slate-500 px-4 py-2.5 rounded-xl text-[10px] font-black uppercase cursor-pointer flex items-center gap-2 hover:bg-slate-50 transition-all shadow-sm">
                                <Icon name="file-up" size={14}/> Import JSON <input type="file" accept=".json" className="hidden" onChange={handleJSONImport}/>
                            </label>
                            <button onClick={handleExportJSON} className="bg-white border border-slate-200 text-slate-500 px-4 py-2.5 rounded-xl text-[10px] font-black uppercase flex items-center gap-2 hover:bg-slate-50 transition-all shadow-sm">
                                <Icon name="file-down" size={14}/> Export
                            </button>
                            <button onClick={() => {setEditingTask(null); setIsModalOpen(true)}} className="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-black uppercase text-[12px] flex items-center gap-2 shadow-xl shadow-indigo-100 hover:bg-indigo-700 hover:-translate-y-0.5 active:translate-y-0 transition-all">
                                <Icon name="plus" size={18} className="stroke-[3.5px]"/>
                                <span>Create New</span>
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-[100vw] px-8 pt-8">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                            <div className="bg-white p-1.5 rounded-3xl border border-slate-200 shadow-sm flex gap-1">
                                {['All', 'Main', 'Sub'].map(m => (
                                    <button key={m} onClick={() => { setHierarchyMode(m); }} className={`px-12 py-3 rounded-2xl text-[11px] font-black uppercase tracking-widest transition-all flex items-center gap-2 ${hierarchyMode === m ? 'bg-slate-900 text-white shadow-xl scale-105' : 'text-slate-400 hover:text-slate-500'}`}>
                                        <span>{m}</span>
                                        <span className={`px-2 py-0.5 rounded-lg text-[9px] ${hierarchyMode === m ? 'bg-white/20 text-white' : 'bg-slate-100 text-slate-400'}`}>{tabCounters[m]}</span>
                                    </button>
                                ))}
                            </div>
                            <div className="bg-white p-1.5 rounded-3xl border border-slate-200 shadow-sm">
                                <button onClick={() => { setShowOnHoldOnly(!showOnHoldOnly); }} className={`px-8 py-3 rounded-2xl text-[11px] font-black uppercase tracking-widest flex items-center gap-2 transition-all ${showOnHoldOnly ? 'bg-rose-500 text-white shadow-xl scale-105' : 'text-slate-400 hover:bg-rose-50 hover:text-rose-500'}`}>
                                    <Icon name="pause-circle" size={16}/>
                                    <span>On Hold Archive ({tasks.filter(t => t.status === 'On Hold').length})</span>
                                </button>
                            </div>
                        </div>

                        {viewMode === 'Timeline' ? (
                            <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-2xl overflow-hidden flex flex-col h-[75vh] animate-fadeIn">
                                <div className="p-6 bg-slate-900 text-white flex justify-between items-center shrink-0">
                                    <div className="flex items-center gap-4">
                                        <div className="bg-white/10 p-2 rounded-xl"><Icon name="gantt-chart" size={24} className="text-indigo-400"/></div>
                                        <div>
                                            <h2 className="text-xl font-black uppercase tracking-tight">{showOnHoldOnly ? 'On Hold Backlog' : 'Live Roadmap'}</h2>
                                            <p className="text-[10px] text-slate-400 font-bold uppercase tracking-[0.3em] mt-1 italic opacity-80">Operational Timeline Overview</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-6">
                                        <div className="flex gap-4 items-center">
                                            <div className="flex items-center gap-2 text-[9px] font-black uppercase"><div className="w-3 h-3 rounded-full bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]"/> Finished</div>
                                            <div className="flex items-center gap-2 text-[9px] font-black uppercase"><div className="w-3 h-3 rounded-full bg-indigo-500 shadow-[0_0_8px_rgba(79,70,229,0.5)]"/> Working</div>
                                        </div>
                                        <div className="h-10 w-px bg-white/10 mx-2"/>
                                        <div className="text-right">
                                            <p className="text-2xl font-black text-white">{timelineQueue.length}</p>
                                            <p className="text-[8px] text-slate-400 font-black uppercase tracking-widest">Active Deliverables</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="overflow-auto relative no-scrollbar flex-1 bg-slate-50/30" ref={timelineContainerRef}>
                                    <div className="min-w-max relative">
                                        {/* Today Vertical Line */}
                                        {todayIndex !== -1 && (
                                            <div className="today-line" style={{ left: `calc(320px + ${todayIndex * 40}px + 19px)` }}>
                                                <div className="bg-red-500 text-white text-[9px] font-black px-2 py-1 rounded-full absolute -top-8 left-1/2 transform -translate-x-1/2 shadow-lg animate-pulse-soft">TODAY</div>
                                            </div>
                                        )}

                                        <table className="border-collapse w-full">
                                            <thead className="sticky top-0 z-[60] shadow-md">
                                                <tr className="glass-header">
                                                    <th className="sticky left-0 bg-white border-b border-r border-slate-200 p-4 text-[10px] font-black uppercase text-slate-400 text-left min-w-[320px] z-[70]">Project Information</th>
                                                    {timelineMonths.map((m, i) => (
                                                        <th key={i} colSpan={m.count} className="p-3 border-b border-r border-slate-200 bg-slate-50/50 text-[10px] font-black text-slate-500 uppercase text-center tracking-widest border-t border-slate-100">
                                                            {m.label}
                                                        </th>
                                                    ))}
                                                </tr>
                                                <tr className="glass-header">
                                                    <th className="sticky left-0 bg-white border-b border-r border-slate-200 p-4 min-w-[320px] z-[70]">
                                                        <div className="relative"><Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-300"/><input type="text" placeholder="Filter task name..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full pl-9 pr-4 py-2 bg-slate-100/50 rounded-xl text-[10px] font-bold outline-none border border-transparent focus:border-indigo-200 transition-all"/></div>
                                                    </th>
                                                    {timelineDates.map((d, i) => (
                                                        <th key={i} className={`p-2 border-b border-r border-slate-100 min-w-[40px] text-center bg-white ${d.getDay() === 0 || d.getDay() === 6 ? 'weekend-col' : ''}`}>
                                                            <div className="text-[7px] font-black text-slate-400 uppercase leading-tight">{d.toLocaleDateString('en-US',{weekday:'short'})}</div>
                                                            <div className={`text-[10px] font-black ${d.toDateString() === new Date().toDateString() ? 'text-red-500' : 'text-slate-700'}`}>{d.getDate()}</div>
                                                        </th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody className="timeline-grid relative">
                                                {timelineQueue.filter(t => t.title.toLowerCase().includes(searchQuery.toLowerCase())).map((task, idx) => {
                                                    const s = parseDate(task.startDate); 
                                                    const du = parseDate(task.dueDate);
                                                    return (
                                                        <tr key={task.id} className="group hover:bg-slate-100/30 transition-colors">
                                                            <td onClick={() => handleAction('edit', task)} className="sticky left-0 bg-white z-20 p-4 border-b border-r border-slate-200 cursor-pointer shadow-[8px_0_15px_rgba(0,0,0,0.02)]">
                                                                <div className="flex items-center gap-3">
                                                                    <div className={`w-2.5 h-2.5 rounded-full shrink-0 ${task.priority === 'High' ? 'bg-rose-500 shadow-[0_0_8px_rgba(244,63,94,0.4)]' : task.priority === 'Medium' ? 'bg-amber-500' : 'bg-indigo-400'}`} />
                                                                    <div className="overflow-hidden">
                                                                        <div className="text-[12px] font-bold text-slate-700 truncate group-hover:text-indigo-600 transition-colors">{task.title}</div>
                                                                        <div className="flex items-center gap-2 mt-1">
                                                                            <span className="text-[8px] font-black text-indigo-400 uppercase tracking-tighter">{task.dept}</span>
                                                                            <span className="text-[8px] font-bold text-slate-300">•</span>
                                                                            <span className="text-[8px] font-bold text-slate-400">{task.startDate} - {task.dueDate}</span>
                                                                        </div>
                                                                    </div>
                                                                </div>
                                                            </td>
                                                            {timelineDates.map((d, i) => {
                                                                const isStart = s && d.toDateString() === s.toDateString();
                                                                const isEnd = du && d.toDateString() === du.toDateString();
                                                                const isInRange = s && du && d >= s && d <= du;
                                                                
                                                                return (
                                                                    <td key={i} className={`border-b border-r border-slate-100 p-0 relative h-[60px] ${d.getDay() === 0 || d.getDay() === 6 ? 'weekend-col' : ''}`}>
                                                                        {isInRange && (
                                                                            <div className={`absolute inset-y-3 left-0 right-0 z-10 task-bar-transition
                                                                                ${task.status === 'Done' ? 'bg-gradient-to-r from-emerald-500 to-emerald-400 shadow-[0_4px_12px_rgba(16,185,129,0.2)]' : 
                                                                                  task.status === 'On Hold' ? 'bg-gradient-to-r from-rose-500 to-rose-400' : 
                                                                                  'bg-gradient-to-r from-indigo-600 to-indigo-500 shadow-[0_4px_12px_rgba(79,70,229,0.2)]'}
                                                                                ${isStart ? 'ml-1 rounded-l-full' : ''} 
                                                                                ${isEnd ? 'mr-1 rounded-r-full' : ''}
                                                                                ${!isStart && !isEnd ? 'opacity-90' : ''}
                                                                            `}>
                                                                                {(isStart || (i === 0 && isInRange)) && (
                                                                                    <div className="h-full flex items-center px-3 gap-2 overflow-hidden pointer-events-none">
                                                                                        <Icon name={task.status === 'Done' ? 'check-circle' : task.status === 'On Hold' ? 'pause' : 'clock'} size={10} className="text-white shrink-0"/>
                                                                                        <span className="text-[8px] font-black text-white uppercase whitespace-nowrap opacity-90">{task.status === 'In Progress' ? 'Working' : task.status}</span>
                                                                                    </div>
                                                                                )}
                                                                            </div>
                                                                        )}
                                                                    </td>
                                                                );
                                                            })}
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        ) : viewMode === 'Board' ? (
                            /* Board View remains functional but uses updated styles */
                            <div className="animate-fadeIn">
                                <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-8 bg-white p-5 rounded-[2rem] border border-slate-200 shadow-sm">
                                    <div className="flex items-center gap-2 overflow-x-auto no-scrollbar w-full md:w-auto">
                                        <Icon name="filter" size={16} className="text-slate-300 mr-2" />
                                        {deptsInUse.map(d => <button key={d} onClick={() => setFilterDept(d)} className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all border whitespace-nowrap ${filterDept === d ? 'bg-slate-900 text-white shadow-md' : 'bg-white text-slate-400 border-slate-100 hover:bg-slate-50'}`}>{d}</button>)}
                                    </div>
                                    <div className="relative w-full md:w-80"><Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" /><input type="text" placeholder="Search tasks..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full pl-12 pr-4 py-3 bg-slate-50 border-none rounded-2xl text-sm font-bold outline-none shadow-inner"/></div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                    {[ { title: showOnHoldOnly ? 'ON HOLD QUEUE' : 'WORKING', status: 'Working' }, { title: showOnHoldOnly ? 'READY TO RESUME' : 'COMPLETED', status: 'Done' } ].map(col => {
                                        const filtered = displayTasks.filter(t => col.status === 'Working' ? (t.status !== 'Done') : t.status === 'Done');
                                        return (
                                            <div key={col.status} className="flex flex-col">
                                                <div className={`flex items-center justify-between mb-6 px-7 py-4 rounded-2xl shadow-xl text-white ${showOnHoldOnly ? 'bg-rose-500' : 'bg-slate-900'}`}>
                                                    <h2 className="font-black uppercase tracking-[0.25em] text-[12px]">{col.title}</h2>
                                                    <span className="text-[11px] font-black bg-white/20 px-4 py-1.5 rounded-full">{filtered.length}</span>
                                                </div>
                                                <div className="space-y-4">
                                                    {filtered.map(t => (
                                                        <div key={t.id} onClick={() => handleAction('edit', t)} className="bg-white rounded-3xl border border-slate-200 p-6 shadow-sm hover:shadow-2xl hover:-translate-y-1 transition-all cursor-pointer relative overflow-hidden group">
                                                            <div className={`absolute left-0 top-0 bottom-0 w-2 ${t.priority === 'High' ? 'bg-rose-500' : t.priority === 'Medium' ? 'bg-amber-500' : 'bg-indigo-500'}`} />
                                                            <div className="flex justify-between items-start mb-3">
                                                                <span className="text-[9px] font-black uppercase text-indigo-500 tracking-wider">{t.parentId ? 'Sub-Deliverable' : 'Main Project'}</span>
                                                                <button onClick={(e) => {e.stopPropagation(); handleAction('delete', t)}} className="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-rose-500 p-1 transition-all"><Icon name="trash-2" size={16}/></button>
                                                            </div>
                                                            <h4 className="text-md font-bold text-slate-800 leading-snug mb-4">{t.title}</h4>
                                                            <div className="flex justify-between items-center text-[10px] font-bold mt-2 pt-4 border-t border-slate-50">
                                                                <div className="flex items-center gap-2"><Icon name="building-2" size={12} className="text-slate-300"/><span className="text-slate-600 uppercase tracking-tight">{t.dept}</span></div>
                                                                <div className="flex items-center gap-2"><Icon name="calendar" size={12} className="text-slate-300"/><span className="text-slate-400 font-mono">{t.dueDate || '-'}</span></div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        ) : (
                            /* Tasks List View */
                            <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-xl overflow-hidden animate-fadeIn mb-20">
                                <table className="w-full text-left">
                                    <thead className="bg-slate-50 border-b border-slate-200">
                                        <tr className="text-[11px] font-black text-slate-400 uppercase tracking-widest">
                                            <th className="p-8">Deliverable Details</th>
                                            <th className="p-8 text-center">Hierarchy</th>
                                            <th className="p-8 text-center">Status Control</th>
                                            <th className="p-8 text-right">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {displayTasks.map(task => (
                                            <tr key={task.id} className="hover:bg-slate-50/50 transition-colors group">
                                                <td className="p-8">
                                                    <p className="text-sm font-bold text-slate-800 mb-1">{task.title}</p>
                                                    <div className="flex gap-4 text-[10px] font-black uppercase text-slate-400 tracking-widest">
                                                        <span>Dept: <b className="text-indigo-500">{task.dept}</b></span>
                                                        <span>Priority: <b className={`${task.priority === 'High' ? 'text-rose-500' : 'text-slate-600'}`}>{task.priority}</b></span>
                                                    </div>
                                                </td>
                                                <td className="p-8 text-center">
                                                    <div className="flex bg-slate-100 p-1.5 rounded-2xl w-fit mx-auto shadow-inner">
                                                        <button onClick={() => handleAction('hierarchy', {id: task.id, parentId: null})} className={`px-6 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${!task.parentId ? 'bg-white text-indigo-600 shadow-md transform scale-105' : 'text-slate-400'}`}>Main</button>
                                                        <button onClick={() => handleAction('hierarchy', {id: task.id, parentId: 'sub-task'})} className={`px-6 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${task.parentId ? 'bg-indigo-600 text-white shadow-md transform scale-105' : 'text-slate-400'}`}>Sub</button>
                                                    </div>
                                                </td>
                                                <td className="p-8">
                                                    <div className="flex gap-2 justify-center">
                                                        {['Done', 'In Progress', 'On Hold'].map(st => (
                                                            <button key={st} onClick={() => handleAction('status', {id: task.id, newStatus: st})} className={`px-4 py-2 rounded-xl text-[9px] font-black uppercase transition-all ${task.status === st ? (st==='Done'?'bg-emerald-500 text-white shadow-lg':st==='On Hold'?'bg-rose-500 text-white shadow-lg':'bg-indigo-600 text-white shadow-lg') : 'bg-white text-slate-300 border border-slate-100'}`}>
                                                                {st === 'In Progress' ? 'Working' : st}
                                                            </button>
                                                        ))}
                                                    </div>
                                                </td>
                                                <td className="p-8 text-right">
                                                    <div className="flex justify-end gap-3">
                                                        <button onClick={() => handleAction('edit', task)} className="p-3 bg-slate-100 hover:bg-indigo-50 text-indigo-400 rounded-xl transition-all"><Icon name="edit-3" size={18}/></button>
                                                        <button onClick={() => handleAction('delete', task)} className="p-3 bg-slate-100 hover:bg-rose-50 text-rose-300 hover:text-rose-500 rounded-xl transition-all"><Icon name="trash-2" size={18}/></button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        )}
                    </main>

                    {/* Modal with improved UX */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[200] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3rem] shadow-2xl w-full max-w-xl overflow-hidden animate-in zoom-in duration-300">
                                <div className="px-10 py-8 bg-slate-900 text-white flex justify-between items-center">
                                    <div><h2 className="text-2xl font-black tracking-tighter uppercase">{editingTask ? 'Modify Registry' : 'New Strategic Entry'}</h2><p className="text-[10px] text-indigo-400 font-black uppercase tracking-[0.4em] mt-1">Operational Data Point</p></div>
                                    <button onClick={() => setIsModalOpen(false)} className="p-3 bg-white/10 hover:bg-white/20 rounded-2xl transition-all"><Icon name="x" size={24}/></button>
                                </div>
                                <form onSubmit={saveForm} className="p-10 space-y-7">
                                    <div className="space-y-2">
                                        <label className="text-[11px] font-black uppercase text-slate-400 tracking-widest ml-3">Task Deliverable Name</label>
                                        <input type="text" required autoFocus className="w-full px-8 py-4 rounded-3xl bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-500 outline-none font-bold text-slate-800 text-md shadow-inner transition-all" value={formData.title} onChange={e => handleTitleChange(e.target.value)}/>
                                    </div>
                                    <div className="grid grid-cols-2 gap-6">
                                        <div className="space-y-2">
                                            <label className="text-[11px] font-black uppercase text-slate-400 tracking-widest ml-3">Start Date</label>
                                            <input type="date" className="w-full px-6 py-4 rounded-2xl bg-slate-50 font-bold text-sm outline-none focus:ring-2 focus:ring-indigo-100" value={formData.startDate} onChange={e => setFormData({...formData, startDate: e.target.value})}/>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[11px] font-black uppercase text-slate-400 tracking-widest ml-3">Due Date</label>
                                            <input type="date" className="w-full px-6 py-4 rounded-2xl bg-slate-50 font-bold text-sm outline-none focus:ring-2 focus:ring-indigo-100" value={formData.dueDate} onChange={e => setFormData({...formData, dueDate: e.target.value})}/>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-6">
                                        <div className="space-y-2">
                                            <label className="text-[11px] font-black uppercase text-slate-400 tracking-widest ml-3">Department</label>
                                            <select className="w-full px-6 py-4 rounded-2xl bg-slate-50 outline-none font-black text-sm cursor-pointer" value={formData.dept} onChange={e => setFormData({...formData, dept: e.target.value})}>
                                                {departments.map(d => <option key={d} value={d}>{d}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[11px] font-black uppercase text-slate-400 tracking-widest ml-3">Hierarchy</label>
                                            <div className="flex bg-slate-100 p-1.5 rounded-2xl">
                                                <button type="button" onClick={() => setFormData({...formData, parentId: null, isManualHierarchy: true})} className={`flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${!formData.parentId ? 'bg-white text-indigo-600 shadow-md' : 'text-slate-400'}`}>Main</button>
                                                <button type="button" onClick={() => setFormData({...formData, parentId: 'sub-task', isManualHierarchy: true})} className={`flex-1 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${formData.parentId ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400'}`}>Sub</button>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="pt-6 flex gap-4">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 bg-slate-100 text-slate-500 py-5 rounded-[1.5rem] font-black uppercase text-[12px] hover:bg-slate-200 transition-all">Cancel</button>
                                        <button type="submit" className="flex-[2] bg-indigo-600 text-white py-5 rounded-[1.5rem] font-black uppercase text-[12px] shadow-2xl shadow-indigo-200 hover:bg-indigo-700 transition-all">Apply Data Changes</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
