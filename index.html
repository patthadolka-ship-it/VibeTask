<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Manager Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .transition-all { transition: all 0.2s ease-in-out; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out forwards; }
        
        .progress-bar-glow { box-shadow: 0 0 15px rgba(79, 70, 229, 0.3); }
        .today-line { width: 2px; border-left: 2px dashed #ef4444; height: 100%; position: absolute; z-index: 10; pointer-events: none; }
    </style>
</head>
<body class="bg-[#f8fafc]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Default Departments
        const INITIAL_DEPARTMENTS = [
            "Account", "ACD", "BIT", "BCD", "ED", "Planning", "HR", "Strategic Planning", 
            "Finance", "B2B Sales & Marketing", "Brand Marketing", "IT", "Online Sales", 
            "B2C Sales", "Inno", "Creative Design", "Mar Com"
        ];

        const Icon = ({ name, size = 18, className = "" }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    const iconName = name.split('-').map((s,i) => i===0 ? s : s.charAt(0).toUpperCase() + s.slice(1)).join('');
                    const svg = window.lucide.icons[name] || window.lucide.icons[iconName];
                    if (svg) {
                        ref.current.innerHTML = svg.toSvg({ width: size, height: size, 'stroke-width': 2, class: className });
                    }
                }
            }, [name, size, className]);
            return <span ref={ref} className={`inline-flex items-center justify-center ${className}`} />;
        };

        const App = () => {
            const [tasks, setTasks] = useState(() => {
                try {
                    const saved = localStorage.getItem('vibetask_manager_v15_final');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) { return []; }
            });

            const [lastUpdated, setLastUpdated] = useState(() => localStorage.getItem('vibetask_ts_v15') || 'Ready');
            const [viewMode, setViewMode] = useState('Board'); 
            const [hierarchyMode, setHierarchyMode] = useState('All'); 
            const [statFilter, setStatFilter] = useState('All');
            const [filterDept, setFilterDept] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingTask, setEditingTask] = useState(null);
            const [showOnHoldOnly, setShowOnHoldOnly] = useState(false);
            const [toast, setToast] = useState(null);

            useEffect(() => {
                localStorage.setItem('vibetask_manager_v15_final', JSON.stringify(tasks));
            }, [tasks]);

            const showToast = (msg) => {
                setToast(msg);
                setTimeout(() => setToast(null), 3000);
            };

            const recordChange = () => {
                const now = new Date().toLocaleString('th-TH', { 
                    day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' 
                });
                setLastUpdated(now);
                localStorage.setItem('vibetask_ts_v15', now);
            };

            const cleanText = (text) => text ? text.replace(/\s*\(.*?\)\s*/g, '').trim() : "";
            
            // Robust Date Parser (Handles DD/MM/YYYY and YYYY-MM-DD)
            const parseDate = (str) => {
                if (!str || str === '-') return null;
                if (typeof str !== 'string') return null;
                
                if (str.includes('/')) {
                    const parts = str.split('/');
                    if (parts.length === 3) {
                        const [d, m, y] = parts;
                        // Handle potential DD/MM/YYYY
                        const date = new Date(`${y}-${m}-${d}`);
                        return isNaN(date.getTime()) ? null : date;
                    }
                }
                const d = new Date(str);
                return isNaN(d.getTime()) ? null : d;
            };

            const formatDateForInput = (str) => {
                const d = parseDate(str);
                if (!d) return "";
                return d.toISOString().split('T')[0];
            };

            const [formData, setFormData] = useState({ 
                title: '', dept: INITIAL_DEPARTMENTS[0], priority: 'Medium', status: 'To Do', category: '', notes: '',
                startDate: '', dueDate: '', parentId: null, isManualHierarchy: false
            });

            const handleExportJSON = () => {
                const dataStr = JSON.stringify(tasks, null, 2);
                const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
                const exportFileDefaultName = `tasks_backup_${new Date().toISOString().split('T')[0]}.json`;
                const linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', exportFileDefaultName);
                linkElement.click();
            };

            const handleJSONImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const parsed = JSON.parse(ev.target.result);
                        if (Array.isArray(parsed)) {
                            setTasks(parsed);
                            recordChange();
                            setStatFilter('All');
                            // If most tasks are On Hold, switch to that view so user sees the data
                            const onHoldCount = parsed.filter(t => t.status === 'On Hold').length;
                            if (onHoldCount > parsed.length / 2) {
                                setShowOnHoldOnly(true);
                            }
                            showToast(`นำเข้าสำเร็จ ${parsed.length} รายการ`);
                        } else {
                            alert('รูปแบบไฟล์ JSON ไม่ถูกต้อง');
                        }
                    } catch (err) {
                        alert('ไม่สามารถอ่านไฟล์ได้: ' + err.message);
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    // Quick CSV parser (basic)
                    const text = ev.target.result;
                    const lines = text.split('\n').filter(l => l.trim());
                    const parsed = lines.slice(1).map((line, idx) => {
                        const cols = line.split(',');
                        return {
                            id: `csv-${idx}-${Date.now()}`,
                            title: cols[0] || 'Untitled',
                            dept: cols[4] || 'Account',
                            priority: 'Medium',
                            status: 'To Do',
                            startDate: cols[10] || '',
                            dueDate: cols[5] || '',
                            parentId: null
                        };
                    });
                    setTasks(parsed);
                    recordChange();
                    showToast(`นำเข้า CSV สำเร็จ ${parsed.length} รายการ`);
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const handleTitleChange = (val) => {
                const subKeywords = ['sub', 'ย่อย', 'แตก', '-', '>', 'detail', 'part'];
                const isLikelySub = subKeywords.some(k => val.toLowerCase().includes(k));
                setFormData(prev => ({
                    ...prev,
                    title: val,
                    parentId: (!prev.isManualHierarchy) ? (isLikelySub ? 'sub-task' : null) : prev.parentId
                }));
            };

            // Dynamic Department List based on data
            const departments = useMemo(() => {
                const set = new Set(INITIAL_DEPARTMENTS);
                tasks.forEach(t => { if(t.dept) set.add(t.dept); });
                return Array.from(set).sort();
            }, [tasks]);

            const sourcePool = useMemo(() => {
                return showOnHoldOnly 
                    ? tasks.filter(t => t.status === 'On Hold') 
                    : tasks.filter(t => t.status !== 'On Hold');
            }, [tasks, showOnHoldOnly]);
            
            const hierarchyPool = useMemo(() => sourcePool.filter(t => {
                if (hierarchyMode === 'Main') return !t.parentId;
                if (hierarchyMode === 'Sub') return !!t.parentId;
                return true;
            }), [sourcePool, hierarchyMode]);

            const tabCounters = useMemo(() => {
                const pool = showOnHoldOnly ? tasks.filter(t => t.status === 'On Hold') : tasks.filter(t => t.status !== 'On Hold');
                return {
                    All: pool.length,
                    Main: pool.filter(t => !t.parentId).length,
                    Sub: pool.filter(t => !!t.parentId).length
                }
            }, [tasks, showOnHoldOnly]);

            const dynamicStats = useMemo(() => ({
                total: hierarchyPool.length,
                finished: hierarchyPool.filter(t => t.status === 'Done').length,
                working: hierarchyPool.filter(t => t.status === 'In Progress' || t.status === 'To Do' || (showOnHoldOnly && t.status === 'On Hold')).length
            }), [hierarchyPool, showOnHoldOnly]);

            const proportions = useMemo(() => {
                const total = sourcePool.length || 1;
                const mainCount = sourcePool.filter(t => !t.parentId).length;
                const subCount = sourcePool.filter(t => !!t.parentId).length;
                return {
                    mainPct: Math.round((mainCount / total) * 100),
                    subPct: Math.round((subCount / total) * 100),
                    mainCount, subCount
                };
            }, [sourcePool]);

            const deptsInUse = useMemo(() => ['All', ...new Set(sourcePool.map(t => t.dept || '-'))], [sourcePool]);

            const displayTasks = useMemo(() => hierarchyPool.filter(t => {
                const search = searchQuery.toLowerCase();
                const matchSearch = (t.title || "").toLowerCase().includes(search) || (t.notes || "").toLowerCase().includes(search);
                const matchDept = filterDept === 'All' || t.dept === filterDept;
                let matchStat = true;
                if (!showOnHoldOnly) {
                    if (statFilter === 'Done') matchStat = t.status === 'Done';
                    if (statFilter === 'Working') matchStat = (t.status === 'In Progress' || t.status === 'To Do');
                }
                return matchSearch && matchDept && matchStat;
            }), [hierarchyPool, searchQuery, filterDept, statFilter, showOnHoldOnly]);

            const timelineQueue = useMemo(() => {
                const base = showOnHoldOnly ? hierarchyPool : hierarchyPool.filter(t => t.status !== 'Done');
                return base.sort((a,b) => (parseDate(a.startDate) || new Date(8640000000000000)) - (parseDate(b.startDate) || new Date(8640000000000000)));
            }, [hierarchyPool, showOnHoldOnly]);

            const timelineDates = useMemo(() => {
                let min = new Date(); let max = new Date();
                max.setDate(max.getDate() + 14);
                
                if (timelineQueue.length > 0) {
                    timelineQueue.forEach(t => {
                        const start = parseDate(t.startDate); const end = parseDate(t.dueDate);
                        if (start && start < min) min = new Date(start); 
                        if (end && end > max) max = new Date(end);
                    });
                }
                
                min.setDate(min.getDate() - 5); 
                max.setDate(max.getDate() + 10);
                
                const dates = []; let curr = new Date(min);
                while (curr <= max) { dates.push(new Date(curr)); curr.setDate(curr.getDate() + 1); }
                return dates;
            }, [timelineQueue]);

            const timelineMonths = useMemo(() => {
                const months = [];
                timelineDates.forEach((date, index) => {
                    const monthLabel = date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
                    if (months.length === 0 || months[months.length - 1].label !== monthLabel) {
                        months.push({ label: monthLabel, startIndex: index, count: 1 });
                    } else months[months.length - 1].count++;
                });
                return months;
            }, [timelineDates]);

            const todayIndex = useMemo(() => timelineDates.findIndex(d => d.toDateString() === new Date().toDateString()), [timelineDates]);

            const handleAction = (type, data) => {
                if (type === 'edit') { 
                    setEditingTask(data); 
                    setFormData({
                        ...data, 
                        startDate: formatDateForInput(data.startDate),
                        dueDate: formatDateForInput(data.dueDate),
                        isManualHierarchy: true
                    }); 
                    setIsModalOpen(true); 
                }
                if (type === 'delete') { if(window.confirm('ต้องการลบงานนี้หรือไม่?')) { setTasks(tasks.filter(t => t.id !== data.id)); recordChange(); } }
                if (type === 'status') { setTasks(tasks.map(t => t.id === data.id ? {...t, status: data.newStatus} : t)); recordChange(); }
                if (type === 'hierarchy') { setTasks(tasks.map(t => t.id === data.id ? {...t, parentId: data.parentId} : t)); recordChange(); }
            };

            const saveForm = (e) => {
                e.preventDefault();
                if (editingTask) setTasks(tasks.map(t => t.id === editingTask.id ? {...formData, id: t.id} : t));
                else setTasks([...tasks, {...formData, id: Date.now().toString()}]);
                recordChange();
                setIsModalOpen(false);
            };

            return (
                <div className="min-h-screen bg-[#f8fafc] text-slate-900 font-sans pb-10">
                    {toast && (
                        <div className="fixed top-5 left-1/2 -translate-x-1/2 z-[300] bg-slate-900 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 animate-fadeIn">
                            <Icon name="check-circle" className="text-emerald-400" />
                            <span className="text-sm font-bold">{toast}</span>
                        </div>
                    )}
                    
                    <nav className="bg-white border-b border-slate-200 sticky top-0 z-[100] px-6 py-3 shadow-sm flex flex-wrap justify-between items-center gap-4">
                        <div className="flex items-center gap-3">
                            <div className="bg-slate-900 p-2.5 rounded-xl text-white shadow-lg"><Icon name="trending-up" size={20}/></div>
                            <div>
                                <h1 className="text-base font-black tracking-tighter uppercase leading-none">Executive Console</h1>
                                <p className="text-[9px] font-bold text-slate-400 uppercase mt-1">Status: <span className="text-indigo-600">{lastUpdated}</span></p>
                            </div>
                        </div>

                        <div className="flex bg-slate-100 p-1.5 rounded-2xl shadow-inner">
                            {['Board', 'Timeline', 'Tasks'].map(v => (
                                <button key={v} onClick={() => setViewMode(v)} className={`px-6 py-2 rounded-xl text-[10px] font-black transition-all ${viewMode === v ? 'bg-white text-slate-900 shadow-md transform scale-105' : 'text-slate-400 hover:text-slate-600'}`}>
                                    {v.toUpperCase()}
                                </button>
                            ))}
                        </div>

                        <div className="flex items-center gap-2">
                            <div className="flex bg-slate-100 rounded-xl p-1 gap-1">
                                <label className="text-indigo-600 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase cursor-pointer flex items-center gap-1.5 hover:bg-white hover:shadow-sm transition-all">
                                    <Icon name="database" size={12}/> Import JSON <input type="file" accept=".json" className="hidden" onChange={handleJSONImport}/>
                                </label>
                                <button onClick={handleExportJSON} className="text-slate-600 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase flex items-center gap-1.5 hover:bg-white hover:shadow-sm transition-all">
                                    <Icon name="download" size={12}/> Export
                                </button>
                            </div>
                            <button onClick={() => {setEditingTask(null); setIsModalOpen(true)}} className="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-black uppercase text-[11px] flex items-center gap-2 shadow-xl shadow-indigo-200 hover:bg-indigo-700 hover:-translate-y-0.5 transition-all border-b-4 border-indigo-800">
                                <Icon name="plus" size={16} className="stroke-[3px]"/>
                                <span>Add Task</span>
                            </button>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-6 pt-8">
                        <div className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                            <div className="invisible hidden md:block w-32"></div>
                            <div className="bg-white p-1.5 rounded-3xl border border-slate-200 shadow-sm flex gap-1">
                                {['All', 'Main', 'Sub'].map(m => (
                                    <button 
                                        key={m} 
                                        onClick={() => { setHierarchyMode(m); setStatFilter('All'); }} 
                                        className={`px-10 py-3 rounded-2xl text-[11px] font-black uppercase tracking-widest transition-all flex items-center gap-2 ${!showOnHoldOnly && hierarchyMode === m ? 'bg-slate-900 text-white shadow-xl scale-105' : 'text-slate-400 hover:text-slate-500'}`}
                                    >
                                        <span>{m}</span>
                                        <span className={`px-2 py-0.5 rounded-lg text-[9px] ${!showOnHoldOnly && hierarchyMode === m ? 'bg-white/20 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                            {tabCounters[m]}
                                        </span>
                                    </button>
                                ))}
                            </div>
                            <div className="bg-white p-1.5 rounded-3xl border border-slate-200 shadow-sm">
                                <button onClick={() => { setShowOnHoldOnly(!showOnHoldOnly); setStatFilter('All'); }} className={`px-8 py-3 rounded-2xl text-[11px] font-black uppercase tracking-widest flex items-center gap-2 transition-all ${showOnHoldOnly ? 'bg-rose-500 text-white shadow-xl scale-105' : 'text-slate-400 hover:bg-rose-50 hover:text-rose-500'}`}>
                                    <Icon name="pause-circle" size={16}/>
                                    <span>On Hold ({tasks.filter(t => t.status === 'On Hold').length})</span>
                                </button>
                            </div>
                        </div>

                        <section className="grid grid-cols-1 sm:grid-cols-3 gap-6 mb-8">
                            {[
                                { label: showOnHoldOnly ? 'TOTAL ON HOLD' : 'ACTIVE TASKS', val: dynamicStats.total, key: 'All', color: showOnHoldOnly ? 'bg-rose-600' : 'bg-indigo-600', icon: showOnHoldOnly ? 'pause-circle' : 'briefcase' },
                                { label: showOnHoldOnly ? 'COMPLETED' : 'FINISHED', val: dynamicStats.finished, key: 'Done', color: showOnHoldOnly ? 'bg-slate-700' : 'bg-emerald-600', icon: 'check-circle-2' },
                                { label: showOnHoldOnly ? 'PENDING' : 'WORKING', val: dynamicStats.working, key: 'Working', color: showOnHoldOnly ? 'bg-slate-500' : 'bg-amber-500', icon: 'zap' },
                            ].map(s => (
                                <div key={s.key} onClick={() => setStatFilter(statFilter === s.key ? 'All' : s.key)} className={`p-8 rounded-[2.5rem] border flex flex-col justify-between h-40 cursor-pointer transition-all active:scale-95 ${statFilter === s.key ? `${s.color} text-white shadow-2xl scale-[1.02]` : `bg-white border-slate-200 shadow-sm hover:border-indigo-300`}`}>
                                    <div className={`p-3 rounded-2xl w-fit ${statFilter === s.key ? 'bg-white/20' : 'bg-slate-50 text-slate-400'}`}><Icon name={s.icon} size={24} /></div>
                                    <div><p className={`text-[10px] font-black uppercase tracking-[0.2em] ${statFilter === s.key ? 'text-white/80' : 'text-slate-400'}`}>{s.label}</p><p className="text-4xl font-black leading-none mt-1">{s.val}</p></div>
                                </div>
                            ))}
                        </section>

                        <section className="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm mb-10 animate-fadeIn">
                            <div className="flex justify-between items-end mb-4">
                                <div>
                                    <h3 className="text-[11px] font-black uppercase tracking-widest text-slate-400 mb-1">Hierarchy Proportion</h3>
                                    <p className="text-lg font-black text-slate-800 uppercase">Main Task vs Sub Task Ratio</p>
                                </div>
                                <div className="text-right">
                                    <span className="text-2xl font-black text-indigo-600">{proportions.mainCount}</span>
                                    <span className="text-slate-300 mx-2 text-xl font-light">/</span>
                                    <span className="text-2xl font-black text-slate-400">{proportions.subCount}</span>
                                </div>
                            </div>
                            <div className="h-6 w-full bg-slate-100 rounded-full overflow-hidden flex relative">
                                <div className="h-full bg-indigo-600 progress-bar-glow flex items-center justify-center text-[10px] text-white font-black" style={{ width: `${proportions.mainPct}%` }}>{proportions.mainPct > 10 && `${proportions.mainPct}%`}</div>
                                <div className="h-full bg-slate-300 flex items-center justify-center text-[10px] text-slate-600 font-black" style={{ width: `${proportions.subPct}%` }}>{proportions.subPct > 10 && `${proportions.subPct}%`}</div>
                            </div>
                        </section>

                        {tasks.length === 0 ? (
                            <div className="bg-white p-20 rounded-[3rem] border border-dashed border-slate-300 text-center animate-fadeIn">
                                <div className="bg-slate-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-slate-300"><Icon name="database" size={40}/></div>
                                <h3 className="text-xl font-black text-slate-800 uppercase mb-2">No Data Available</h3>
                                <p className="text-slate-400 text-sm mb-8">กรุณานำเข้าไฟล์ JSON หรือเพิ่มงานใหม่เพื่อเริ่มต้นใช้งาน</p>
                            </div>
                        ) : (
                            viewMode === 'Board' ? (
                                <>
                                    <div className="flex flex-col md:flex-row justify-between items-center gap-4 mb-8 bg-white p-5 rounded-[2rem] border border-slate-100 shadow-sm">
                                        <div className="flex items-center gap-2 overflow-x-auto no-scrollbar w-full md:w-auto">
                                            <Icon name="filter" size={16} className="text-slate-300 mr-2" />
                                            {deptsInUse.map(d => <button key={d} onClick={() => setFilterDept(d)} className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all border whitespace-nowrap ${filterDept === d ? 'bg-slate-900 text-white shadow-md' : 'bg-white text-slate-400 border-slate-100 hover:bg-slate-50'}`}>{d}</button>)}
                                        </div>
                                        <div className="relative w-full md:w-80"><Icon name="search" size={18} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" /><input type="text" placeholder="ค้นหางาน..." value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full pl-12 pr-4 py-3 bg-slate-50 border-none rounded-2xl text-sm font-bold outline-none shadow-inner"/></div>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                        {[ 
                                            { title: showOnHoldOnly ? 'ON HOLD QUEUE' : 'WORKING', status: 'Working' }, 
                                            { title: showOnHoldOnly ? 'READY TO RESUME' : 'COMPLETED', status: 'Done' } 
                                        ].map(col => {
                                            const filtered = displayTasks.filter(t => col.status === 'Working' ? (t.status !== 'Done') : t.status === 'Done');
                                            return (
                                                <div key={col.status} className="flex flex-col animate-fadeIn">
                                                    <div className={`flex items-center justify-between mb-6 px-7 py-3.5 rounded-[1.5rem] shadow-xl text-white ${showOnHoldOnly ? 'bg-rose-500' : 'bg-slate-900'}`}>
                                                        <h2 className="font-black uppercase tracking-[0.25em] text-[12px]">{col.title}</h2>
                                                        <span className="text-[10px] font-black bg-white/20 px-3.5 py-1.5 rounded-full">{filtered.length}</span>
                                                    </div>
                                                    <div className="space-y-4">
                                                        {filtered.map(t => (
                                                            <div key={t.id} onClick={() => handleAction('edit', t)} className="bg-white rounded-2xl border border-slate-200 p-5 shadow-sm hover:shadow-lg transition-all cursor-pointer relative overflow-hidden group">
                                                                <div className={`absolute left-0 top-0 bottom-0 w-1.5 ${t.priority === 'High' ? 'bg-rose-500' : t.priority === 'Medium' ? 'bg-amber-500' : 'bg-indigo-500'}`} />
                                                                <div className="flex justify-between items-start mb-2">
                                                                    <span className="text-[8px] font-black uppercase text-indigo-400">{t.parentId ? 'SUB' : 'MAIN'}</span>
                                                                    <button onClick={(e) => {e.stopPropagation(); handleAction('delete', t)}} className="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-rose-500 p-1 transition-all"><Icon name="trash-2" size={14}/></button>
                                                                </div>
                                                                <h4 className="text-sm font-bold text-slate-800 leading-snug mb-2">{t.title}</h4>
                                                                {t.notes && <p className="text-[10px] text-slate-400 line-clamp-2 mb-3 leading-relaxed">{t.notes}</p>}
                                                                <div className="flex justify-between items-center text-[9px] font-bold mt-2 pt-3 border-t border-slate-50">
                                                                    <span className="text-indigo-500">{t.dept}</span>
                                                                    <span className="text-slate-300">{t.dueDate || '-'}</span>
                                                                </div>
                                                            </div>
                                                        ))}
                                                        {filtered.length === 0 && <div className="py-10 text-center text-slate-300 text-xs font-black uppercase tracking-widest">No Items</div>}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </>
                            ) : viewMode === 'Timeline' ? (
                                <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm mb-20 overflow-hidden flex flex-col max-h-[750px] animate-fadeIn">
                                    <div className="p-7 border-b border-slate-100 bg-slate-50 flex justify-between items-center shrink-0">
                                        <h2 className="text-xl font-black text-slate-800 tracking-tight uppercase">{showOnHoldOnly ? 'ON HOLD ROADMAP' : 'ACTIVE TIMELINE'}</h2>
                                    </div>
                                    <div className="overflow-auto relative no-scrollbar" ref={timelineContainerRef}>
                                        <table className="w-full border-separate border-spacing-0">
                                            <thead>
                                                <tr className="sticky top-0 z-[55]">
                                                    <th className="sticky left-0 bg-slate-100 p-4 border-b border-r text-[11px] font-black uppercase text-slate-400 text-left min-w-[250px] z-[60]">Task Name</th>
                                                    {timelineMonths.map((m, i) => <th key={i} colSpan={m.count} className="p-2.5 border-b border-r bg-indigo-50/80 backdrop-blur-md text-[10px] font-black text-indigo-600 uppercase text-center">{m.label}</th>)}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {timelineQueue.map(task => {
                                                    const s = parseDate(task.startDate); const du = parseDate(task.dueDate);
                                                    return (
                                                        <tr key={task.id} className="hover:bg-slate-50/50 group">
                                                            <td onClick={() => handleAction('edit', task)} className="sticky left-0 bg-white z-20 p-4 border-b border-r text-xs font-bold text-slate-700 cursor-pointer group-hover:bg-slate-50 shadow-[4px_0_10px_rgba(0,0,0,0.02)]">
                                                                <div className="flex items-center gap-2.5">
                                                                    <div className={`w-2 h-2 rounded-full shrink-0 ${task.priority === 'High' ? 'bg-rose-500' : 'bg-indigo-500'}`} />
                                                                    <span className="truncate max-w-[180px]">{task.title}</span>
                                                                </div>
                                                                <div className="text-[9px] font-black text-indigo-400 mt-1 uppercase">{task.dept}</div>
                                                            </td>
                                                            {timelineDates.map((d, i) => <td key={i} className="border-b border-r p-0 relative h-14">
                                                                {s && du && d >= s && d <= du && <div className={`absolute inset-y-4 left-0 right-0 z-0 ${task.status === 'In Progress' ? 'bg-indigo-600' : task.status === 'Done' ? 'bg-emerald-500' : 'bg-rose-400'} ${d.toDateString() === s.toDateString() ? 'rounded-l-full' : ''} ${d.toDateString() === du.toDateString() ? 'rounded-r-full' : ''}`} />}
                                                            </td>)}
                                                        </tr>
                                                    );
                                                })}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            ) : (
                                <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm mb-20 overflow-hidden animate-fadeIn">
                                    <table className="w-full text-left">
                                        <thead>
                                            <tr className="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b bg-slate-50">
                                                <th className="p-6">Task Name & Details</th>
                                                <th className="p-6 text-center">Hierarchy</th>
                                                <th className="p-6 text-center">Status</th>
                                                <th className="p-6 text-right">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {displayTasks.map(task => (
                                                <tr key={task.id} className="hover:bg-slate-50/50 transition-colors group">
                                                    <td className="p-6">
                                                        <p className="text-sm font-bold text-slate-800 mb-1">{task.title}</p>
                                                        <div className="flex gap-4 text-[9px] font-black uppercase text-slate-400 tracking-widest">
                                                            <span>Dept: <b className="text-indigo-500">{task.dept}</b></span>
                                                            <span>Due: <b className="text-slate-600">{task.dueDate || '-'}</b></span>
                                                        </div>
                                                    </td>
                                                    <td className="p-6 text-center">
                                                        <button onClick={() => handleAction('hierarchy', {id: task.id, parentId: task.parentId ? null : 'sub-task'})} className={`px-4 py-1.5 rounded-xl text-[10px] font-black uppercase ${!task.parentId ? 'bg-indigo-50 text-indigo-600' : 'bg-slate-100 text-slate-400'}`}>
                                                            {!task.parentId ? 'Main' : 'Sub'}
                                                        </button>
                                                    </td>
                                                    <td className="p-6">
                                                        <div className="flex gap-1.5 justify-center">
                                                            {['Done', 'In Progress', 'On Hold'].map(st => (
                                                                <button key={st} onClick={() => handleAction('status', {id: task.id, newStatus: st})} className={`px-3 py-1.5 rounded-lg text-[8px] font-black uppercase transition-all ${task.status === st ? (st==='Done'?'bg-emerald-600 text-white':st==='On Hold'?'bg-rose-500 text-white':'bg-amber-500 text-white') : 'bg-white text-slate-300 border border-slate-100'}`}>
                                                                    {st}
                                                                </button>
                                                            ))}
                                                        </div>
                                                    </td>
                                                    <td className="p-6 text-right">
                                                        <div className="flex justify-end gap-2">
                                                            <button onClick={() => handleAction('edit', task)} className="p-2 hover:bg-indigo-50 text-indigo-400 rounded-lg transition-all"><Icon name="edit-2" size={16}/></button>
                                                            <button onClick={() => handleAction('delete', task)} className="p-2 hover:bg-rose-50 text-rose-300 hover:text-rose-500 rounded-lg transition-all"><Icon name="trash-2" size={16}/></button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )
                        )}
                    </main>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-[200] flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3.5rem] shadow-2xl w-full max-w-xl overflow-hidden animate-in zoom-in duration-200">
                                <div className="px-10 py-8 bg-slate-900 text-white flex justify-between items-center">
                                    <h2 className="text-2xl font-black tracking-tighter uppercase">{editingTask ? 'Edit Task' : 'Add New Task'}</h2>
                                    <button onClick={() => setIsModalOpen(false)} className="p-3 bg-white/10 hover:bg-white/20 rounded-2xl transition-all"><Icon name="x" size={24}/></button>
                                </div>
                                <form onSubmit={saveForm} className="p-10 space-y-7">
                                    <div className="space-y-1.5">
                                        <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-3">Task Deliverable Name</label>
                                        <input type="text" required autoFocus className="w-full px-8 py-4 rounded-3xl bg-slate-50 border-2 border-transparent focus:bg-white focus:border-indigo-500 outline-none font-bold text-slate-800 text-md shadow-inner transition-all" value={formData.title} onChange={e => handleTitleChange(e.target.value)}/>
                                    </div>
                                    <div className="grid grid-cols-2 gap-5">
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-3">Start Date</label>
                                            <input type="date" className="w-full px-6 py-4 rounded-2xl bg-slate-50 outline-none font-bold text-xs" value={formData.startDate} onChange={e => setFormData({...formData, startDate: e.target.value})}/>
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-3">Due Date</label>
                                            <input type="date" className="w-full px-6 py-4 rounded-2xl bg-slate-50 outline-none font-bold text-xs" value={formData.dueDate} onChange={e => setFormData({...formData, dueDate: e.target.value})}/>
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-5">
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-3">Department</label>
                                            <select className="w-full px-6 py-4 rounded-2xl bg-slate-50 outline-none font-black text-xs" value={formData.dept} onChange={e => setFormData({...formData, dept: e.target.value})}>
                                                {departments.map(d => <option key={d} value={d}>{d}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black uppercase text-slate-400 tracking-widest ml-3">Hierarchy</label>
                                            <div className="flex bg-slate-100 p-1.5 rounded-2xl">
                                                <button type="button" onClick={() => setFormData({...formData, parentId: null, isManualHierarchy: true})} className={`flex-1 py-2.5 rounded-xl text-[10px] font-black transition-all ${!formData.parentId ? 'bg-white text-indigo-600 shadow-md' : 'text-slate-400'}`}>Main</button>
                                                <button type="button" onClick={() => setFormData({...formData, parentId: 'sub-task', isManualHierarchy: true})} className={`flex-1 py-2.5 rounded-xl text-[10px] font-black transition-all ${formData.parentId ? 'bg-indigo-600 text-white shadow-md' : 'text-slate-400'}`}>Sub</button>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="pt-6 flex gap-4">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 bg-slate-100 text-slate-400 py-5 rounded-[1.5rem] font-black uppercase text-[11px]">Discard</button>
                                        <button type="submit" className="flex-[2] bg-indigo-600 text-white py-5 rounded-[1.5rem] font-black uppercase text-[11px] shadow-xl shadow-indigo-100">Save Task</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
